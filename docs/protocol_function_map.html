<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libsignal Protocols Code Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f7;--surface:#fff;--text:#1a1d26;--text2:#4a5068;--muted:#8892a8;
  --border:#e2e5ed;--hover:#f0f2f8;
  --pqxdh:#2A7B7B;--ratchet:#2A7B7B;--spqr-c:#2A7B7B;--spqr:#2A7B7B;
  --impl:#3b6b9e;
  --ext:#7a6530;
  --active-glow:rgba(124,77,204,.2);
  --radius:10px;--radius-sm:7px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-width:1240px;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1640px;margin:0 auto;padding:28px 36px 60px}

/* Header */
h1{font-size:24px;font-weight:700;text-align:center;letter-spacing:-.3px;margin-bottom:24px}
.hero-pill{display:block;flex:1;background:linear-gradient(135deg,#e8eaf0 0%,#d5d9e3 100%);color:var(--text);padding:14px 28px;border-radius:12px;font-size:26px;font-weight:700;letter-spacing:-.3px;box-shadow:0 1px 6px rgba(0,0,0,.08);text-align:left}
.hero-pill-wrap{margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.switch-view{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:700;text-decoration:none;box-shadow:0 1px 6px rgba(0,0,0,.06);transition:all .15s}
.switch-view:hover{background:var(--hover);transform:translateY(-1px);text-decoration:none}


/* Two-column layout */
.main-layout{display:flex;gap:24px;align-items:flex-start}
.left-col{flex:0 0 700px;min-width:0}
.right-col{flex:1;min-width:0;position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04),0 6px 24px rgba(0,0,0,.04)}

/* Section labels */
.layer-lbl{font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.6px;margin:24px 0 10px;display:flex;align-items:center;gap:10px}
.layer-lbl .note{font-weight:400;font-size:11px;text-transform:none;letter-spacing:0;color:var(--text2);opacity:.85}
.layer-lbl .reset-btn{margin-left:auto;text-transform:none;letter-spacing:0;font-size:14px;font-weight:600;color:#fff;border:none;border-radius:6px;padding:5px 14px;cursor:pointer;opacity:.5;transition:all .15s}
.layer-lbl .reset-btn:hover{opacity:.8;transform:translateY(-1px)}
.layer-lbl .reset-btn.active{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,.5)}
.layer-lbl .reset-btn.proto-reset{background:#2A7B7B}
.layer-lbl .reset-btn.crate-reset{background:#3b6b9e}
.row{display:flex;gap:10px;margin-bottom:10px}
.card-grid{display:grid;gap:10px}
.card-grid.protocols{grid-template-columns:repeat(3,minmax(0,1fr))}
.card-grid.crates,.card-grid.external{grid-template-columns:repeat(2,minmax(0,1fr))}

/* Protocol cards */
.proto{border-radius:var(--radius);padding:14px 58px 34px 14px;color:#fff;flex:1;min-width:0;cursor:pointer;transition:all .2s ease;opacity:1;position:relative;min-height:92px}
.proto:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.proto.active{box-shadow:0 0 0 2.5px #fff,0 8px 28px rgba(0,0,0,.2);transform:translateY(-2px)}
.proto.dimmed{opacity:.35}
.proto .count-badge{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.25);font-size:12px;font-weight:700;padding:2px 8px;border-radius:5px;backdrop-filter:blur(4px)}
.proto h3{font-size:14px;font-weight:700;margin-bottom:3px;letter-spacing:-.2px;line-height:1.28}
.proto .kind{font-size:11px;opacity:.7;font-weight:400}

/* Crate cards */
.crate{border-radius:var(--radius-sm);padding:12px 14px;color:#fff;cursor:pointer;transition:all .2s ease;position:relative;flex:1;min-width:0}
.crate:hover{box-shadow:0 6px 20px rgba(0,0,0,.15);transform:translateY(-2px)}
.crate.dim{opacity:.3}
.crate.dimmed{opacity:.35}
.crate.active{box-shadow:0 0 0 2.5px #fff,0 6px 20px rgba(0,0,0,.18)}
.crate.glow{box-shadow:0 0 0 2.5px var(--active-glow),0 6px 20px rgba(0,0,0,.12)}
.crate h4{font-size:13px;font-weight:700;letter-spacing:-.1px}
.crate .fc{font-size:12px;opacity:.8;margin-top:4px;font-weight:500}
.crate .fc b{font-weight:700;font-size:14px}

/* Right panel */
.panel{padding:20px 22px 32px}
.panel .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel h3{font-size:16px;font-weight:700;letter-spacing:-.2px}
.panel .tag{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;color:#fff;margin-left:10px}
.panel .stats{font-size:12px;color:var(--muted);margin-bottom:14px;font-weight:500;display:flex;align-items:center;gap:10px}
.panel .stats .expand-btns{margin-left:auto;display:flex;gap:4px}
.expand-btn{border:none;border-radius:4px;padding:3px 10px;font-size:10px;font-weight:600;font-family:inherit;color:#fff;cursor:pointer;transition:all .15s}
.expand-btn:hover{opacity:.85;transform:translateY(-1px)}
.expand-btn.is-expand{background:#7a9a8a}
.expand-btn.is-collapse{background:#a89080}

/* Tree */
.tree{font-size:13px;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;line-height:1.6}
.tree-node{margin-bottom:1px}
.tree-dir{cursor:pointer;display:flex;align-items:center;gap:6px;border-radius:6px;padding:7px 10px;transition:background .12s}
.tree-dir:hover{background:var(--hover)}
.tree-dir .arrow{font-size:10px;width:14px;color:var(--muted);flex-shrink:0;transition:transform .15s;display:inline-block}
.tree-dir .arrow.open{transform:rotate(90deg)}
.tree-dir .icon{font-size:14px;flex-shrink:0}
.tree-dir .name{font-weight:600;color:var(--text);font-size:13px;flex:1;min-width:0}
.tree-dir .cnt{font-size:10px;color:var(--muted);flex-shrink:0;font-weight:500;background:#f0f2f6;padding:1px 6px;border-radius:4px;min-width:48px;text-align:right;font-variant-numeric:tabular-nums}
.tree-dir.dimmed{opacity:.25}
.tree-children{margin-left:20px;overflow:hidden;border-left:1px solid #edf0f5;padding-left:4px}
.tree-children.collapsed{display:none}
.tree-file{cursor:pointer;display:flex;align-items:center;gap:6px;border-radius:6px;padding:6px 10px;transition:background .12s}
.tree-file:hover{background:var(--hover)}
.tree-file .arrow{font-size:10px;width:14px;color:var(--muted);flex-shrink:0;transition:transform .15s;display:inline-block}
.tree-file .arrow.open{transform:rotate(90deg)}
.tree-file .icon{font-size:13px;flex-shrink:0;color:#6B8EB5}
.tree-file .name{color:#2d6cb5;font-weight:500;font-size:13px;flex:1;min-width:0}
.tree-file .cnt{font-size:10px;color:var(--muted);flex-shrink:0;font-weight:500;background:#f0f2f6;padding:1px 6px;border-radius:4px;min-width:48px;text-align:right;font-variant-numeric:tabular-nums}
.tree-file.dimmed{opacity:.25}
.tree-fns{margin-left:36px;overflow:hidden}
.tree-fns.collapsed{display:none}
.tree-fn{padding:6px 8px;border-left:2px solid #e4e8f0;margin-left:4px;margin-bottom:2px;font-size:12px;line-height:1.6;transition:all .12s;border-radius:0 5px 5px 0}
.tree-fn:hover{background:#f4f6fc;border-left-color:var(--spqr)}
.tree-fn.match-hl{background:#fefce8;border-left-color:#d4a017}
.tree-fn.hidden-fn{display:none}
.tree-fn-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.tree-fn-main{min-width:0;flex:1}
.tree-fn code{color:var(--text);font-weight:600;font-size:12.5px}
.tree-fn .sig{color:var(--text2);font-size:11.5px}
.tree-fn .ptag-row{margin-top:4px;display:flex;gap:3px}
.tree-fn .ptag-sm{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;font-weight:600;font-family:'Inter',system-ui,sans-serif}
.tree-fn .source-link{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;padding:3px 9px;border:1px solid #cfd6e4;border-radius:999px;background:#fff;color:#2d6cb5;font-size:10.5px;font-weight:700;font-family:'Inter',system-ui,sans-serif;text-decoration:none;white-space:nowrap}
.tree-fn .source-link:hover{background:#eef3fb;text-decoration:none}

/* Legend */

/* Scrollbar */
.right-col::-webkit-scrollbar{width:6px}
.right-col::-webkit-scrollbar-track{background:transparent}
.right-col::-webkit-scrollbar-thumb{background:#d0d4de;border-radius:3px}
.right-col::-webkit-scrollbar-thumb:hover{background:#b0b6c4}
</style>
</head>
<body>
<div class="wrap">

<div class="hero-pill-wrap"><span class="hero-pill">Libsignal Protocols Code Map</span><a class="switch-view" href="protocol-code-map.html">Switch view</a></div>

<div class="main-layout">

<div class="left-col">
<!-- Protocols — also serves as filter bar -->
<div class="layer-lbl" style="margin-top:0">Security Protocols <button class="reset-btn proto-reset active" id="btn-all-protos" onclick="resetProtoFilter()">All protocols <span id="cnt-all"></span></button></div>
<div class="card-grid protocols" id="protocol-grid"></div>
<!-- Implementation Crates -->
<div class="layer-lbl">Implementation Crates <button class="reset-btn crate-reset active" id="btn-all-crates" onclick="resetCrateFilter()">All crates</button></div>
<div class="card-grid crates" id="implementation-grid"></div>

<!-- External Crypto -->
<div class="layer-lbl">External Crypto Crates</div>
<div class="card-grid external" id="external-grid"></div>

</div><!-- /left-col -->

<!-- Right panel — always visible function browser -->
<div class="right-col">
  <div class="panel" id="pnl">
    <div class="head">
      <div><h3 id="pt">Function browser</h3></div>
    </div>
    <div class="stats"><span id="st"></span><span class="expand-btns"><button class="expand-btn is-expand" onclick="expandAll()">Expand all</button><button class="expand-btn is-collapse" onclick="collapseAll()">Collapse all</button></span></div>
    <div id="pc" class="tree"></div>
  </div>
</div><!-- /right-col -->
</div><!-- /main-layout -->
</div><!-- /wrap -->

function applyView(view){
  VIEW=view;
  D=Object.fromEntries(VIEW.crates.map(crate=>[crate.id,{c:crate.color,name:crate.label,kind:crate.kind,tree:crate.tree,count:crate.count}]));
  PROTOCOLS=VIEW.protocols;
  PC=Object.fromEntries(PROTOCOLS.map(protocol=>[protocol.id, protocol.color]));
  PC.all="#888";
  PN=Object.fromEntries(PROTOCOLS.map(protocol=>[protocol.id, protocol.short_label]));
  PN.all="All";
  totalFns=VIEW.total_internal_functions;
  INTERNAL_CRATES=VIEW.crates.filter(crate=>crate.kind==="internal");
  EXTERNAL_CRATES=VIEW.crates.filter(crate=>crate.kind==="external");
  EXT_CRATES=new Set(EXTERNAL_CRATES.map(crate=>crate.id));
  document.getElementById("cnt-all").textContent=totalFns;
}

async function loadSharedPayload(){
  try{
    const response=await fetch("protocol-code-map.json",{cache:"no-store"});
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    return await response.json();
  }catch(error){
    console.warn("Using embedded fallback view.",error);
    return null;
  }
}

function relativeFunctionPath(crateId, fn){
  const url=String(fn.source_url||"");
  const marker="/blob/main/";
  if(url.includes(marker)){
    let repoPath=url.split(marker)[1].split("#")[0];
    const prefix=CRATE_URL_PREFIX[crateId]||"";
    if(prefix&&repoPath.startsWith(prefix))repoPath=repoPath.slice(prefix.length);
    if(repoPath)return repoPath;
  }
  const file=String(fn.file||"").replace(/\\/g,"/");
  const srcIndex=file.indexOf("/src/");
  if(srcIndex!==-1)return file.slice(srcIndex+1);
  return file.split("/").pop()||"unknown.rs";
}

function insertTreeRow(tree, parts, row){
  const cleanParts=parts.filter(Boolean);
  if(!cleanParts.length)return;
  const [head,...rest]=cleanParts;
  if(!rest.length){
    if(!Array.isArray(tree[head]))tree[head]=[];
    tree[head].push(row);
    return;
  }
  if(!tree[head]||Array.isArray(tree[head]))tree[head]={};
  insertTreeRow(tree[head],rest,row);
}

function collectExternalItems(node, protocolId, sink){
  if(!node||typeof node!=="object")return;
  for(const item of node.external||[]){
    if(!sink[item.crate])sink[item.crate]={};
    if(!sink[item.crate][item.item])sink[item.crate][item.item]=new Set();
    sink[item.crate][item.item].add(protocolId);
  }
  for(const child of node.children||[]){
    collectExternalItems(child, protocolId, sink);
  }
}

function buildAltViewFromPayload(payload){
  const protocolIds=payload.protocols.filter(protocol=>protocol.kind!=="composition").map(protocol=>protocol.id);
  const protocolOrder=new Map(protocolIds.map((id,index)=>[id,index]));
  const memberships=new Map();
  for(const protocol of payload.protocols){
    if(protocol.kind==="composition")continue;
    for(const summary of Object.values(protocol.crate_summary||{})){
      for(const fn of summary.functions||[]){
        if(!memberships.has(fn.id))memberships.set(fn.id,new Set());
        memberships.get(fn.id).add(protocol.id);
      }
    }
  }

  const externalItems={};
  for(const protocol of payload.protocols){
    if(protocol.kind==="composition")continue;
    for(const tree of protocol.tree_roots||[]){
      collectExternalItems(tree, protocol.id, externalItems);
    }
  }

  const protocols=payload.protocols
    .filter(protocol=>protocol.kind!=="composition")
    .map(protocol=>{
      const meta=ALT_PROTOCOL_META[protocol.id]||{};
      return{
        id:protocol.id,
        label:protocol.label,
        short_label:meta.short_label||protocol.label,
        kind:meta.kind||"",
        color:meta.color||"#2A7B7B",
        count:protocol.function_count,
      };
    });

  const crates=payload.crates.map(crate=>{
    const tree={};
    if(crate.internal){
      const functions=[...(crate.functions||[])].sort((a,b)=>
        String(a.file).localeCompare(String(b.file))||
        Number(a.line)-Number(b.line)||
        String(a.display).localeCompare(String(b.display))
      );
      for(const fn of functions){
        const rel=relativeFunctionPath(crate.id, fn);
        const protocolList=[...(memberships.get(fn.id)||new Set())].sort((a,b)=>(protocolOrder.get(a)??999)-(protocolOrder.get(b)??999));
        insertTreeRow(tree, rel.split("/"), {
          n:fn.display,
          s:`line ${fn.line}`,
          p:protocolList,
          u:fn.source_url||"",
        });
      }
    }else{
      for(const [item, protocolSet] of Object.entries(externalItems[crate.id]||{}).sort((a,b)=>a[0].localeCompare(b[0]))){
        insertTreeRow(tree, ["external-items.txt"], {
          n:item,
          s:"external dependency",
          p:[...protocolSet].sort((a,b)=>(protocolOrder.get(a)??999)-(protocolOrder.get(b)??999)),
          u:"",
        });
      }
    }
    return{
      id:crate.id,
      label:crate.label,
      kind:crate.internal?"internal":"external",
      color:ALT_CRATE_COLORS[crate.id]||ALT_EXTERNAL_COLOR,
      count:crate.function_count,
      tree,
    };
  });

  return{
    total_internal_functions:payload.audit.covered_function_count,
    protocols,
    crates,
  };
}

function fnMatches(f){
  const mp=activeFilter==="all"||f.p.includes(activeFilter);
  const haystack=`${f.n} ${f.s||""}`.toLowerCase();
  const ms=!searchTerm||haystack.includes(searchTerm);
  return mp&&ms;
}

function nodeHasMatch(node){
  if(Array.isArray(node))return node.some(fnMatches);
  return Object.values(node).some(nodeHasMatch);
}

function countMatchesInNode(node){
  if(Array.isArray(node))return node.filter(fnMatches).length;
  let c=0;for(const v of Object.values(node))c+=countMatchesInNode(v);return c;
}

function countAllInNode(node){
  if(Array.isArray(node))return node.length;
  let c=0;for(const v of Object.values(node))c+=countAllInNode(v);return c;
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function escAttr(s){return esc(s).replace(/"/g,"&quot;")}
function stripFn(s){return String(s||"").replace(/^pub\s+async\s+fn|^pub\(\w+\)\s+fn|^pub\s+fn|^fn/,"").trim()}
function mergeSig(n,s){
  const ss=stripFn(s);
  if(!ss)return{name:n,sig:""};
  if(n.endsWith("()")&&ss.startsWith("("))return{name:n.slice(0,-1),sig:ss.slice(1)};
  return{name:n,sig:ss};
}

function crateCount(crate){
  return activeFilter==="all"&&!searchTerm?crate.count:countMatchesInNode(crate.tree);
}

function renderProtocolCards(){
  protocolGrid.innerHTML=PROTOCOLS.map(protocol=>`<div class="proto${activeFilter===protocol.id?" active":""}${activeFilter!=="all"&&activeFilter!==protocol.id?" dimmed":""}" style="background:${protocol.color}" data-p="${escAttr(protocol.id)}"><span class="count-badge">${protocol.count}</span><h3>${esc(protocol.label)}</h3><span class="kind">${esc(protocol.kind)}</span></div>`).join("");
  protocolGrid.querySelectorAll(".proto[data-p]").forEach(el=>{
    el.addEventListener("click",()=>{
      activeFilter=activeFilter===el.dataset.p?"all":el.dataset.p;
      applyFilter();
    });
  });
  document.getElementById("btn-all-protos").classList.toggle("active",activeFilter==="all");
}

function renderCrateGrid(container, crates){
  container.innerHTML=crates.map(crate=>{
    const count=crateCount(crate);
    const dimFromFilter=(activeFilter!=="all"||searchTerm)&&count===0;
    const dimFromCrate=currentCrate!=="__all__"&&currentCrate!==crate.id;
    const classes=["crate",dimFromFilter?"dim":"",dimFromCrate?"dimmed":"",currentCrate===crate.id?"active":"",activeFilter!=="all"&&count>0?"glow":""].filter(Boolean).join(" ");
    const meta=crate.kind==="internal"?`<div class="fc"><b>${count}</b> fns</div>`:"";
    return `<div class="${classes}" data-c="${escAttr(crate.id)}" style="background:${crate.color}"><h4>${esc(crate.label)}</h4>${meta}</div>`;
  }).join("");
  container.querySelectorAll(".crate[data-c]").forEach(el=>el.addEventListener("click",()=>switchCrate(el.dataset.c)));
}

function renderSidebar(){
  renderProtocolCards();
  renderCrateGrid(implementationGrid, INTERNAL_CRATES);
  renderCrateGrid(externalGrid, EXTERNAL_CRATES);
  document.getElementById("btn-all-crates").classList.toggle("active",currentCrate==="__all__");
}

function applyFilter(){
  if(currentCrate!=="__all__"){
    const cd=D[currentCrate];
    if(cd&&countMatchesInNode(cd.tree)===0)currentCrate="__all__";
  }
  renderSidebar();
  renderPanel(currentCrate);
}

window.resetProtoFilter=function(){
  activeFilter="all";
  applyFilter();
};

window.resetCrateFilter=function(){
  currentCrate="__all__";
  renderSidebar();
  renderPanel(currentCrate);
};

function renderTree(node,path=""){
  let html="";
  if(Array.isArray(node)){
    html+="<div class=\"tree-fns collapsed\">";
    for(const f of node){
      const m=fnMatches(f);
      const cls=m?(searchTerm?"tree-fn match-hl":"tree-fn"):"tree-fn hidden-fn";
      const mg=mergeSig(f.n,f.s);
      html+=`<div class="${cls}"><div class="tree-fn-top"><div class="tree-fn-main"><code>${esc(mg.name)}</code>${mg.sig?` <span class="sig">${esc(mg.sig)}</span>`:""}</div>${f.u?`<a class="source-link" href="${escAttr(f.u)}" target="_blank" rel="noreferrer">Source</a>`:""}</div>`;
      html+=`<span class="ptag-row">${f.p.map(p=>`<span class="ptag-sm" style="background:${PC[p]||"#888"}">${PN[p]||p}</span>`).join("")}</span>`;
      html+="</div>";
    }
    html+="</div>";
    return html;
  }
  for(const[name,child] of Object.entries(node)){
    const isFile=Array.isArray(child);
    const hasMatch=isFile?child.some(fnMatches):nodeHasMatch(child);
    const matchCount=isFile?child.filter(fnMatches).length:countMatchesInNode(child);
    const totalCount=isFile?child.length:countAllInNode(child);
    const dimCls=(activeFilter!=="all"||searchTerm)&&!hasMatch?" dimmed":"";
    const fullPath=path+name;
    if(isFile){
      html+=`<div class="tree-node"><div class="tree-file${dimCls}" data-path="${esc(fullPath)}" onclick="toggleNext(this)"><span class="arrow">▶</span><span class="icon">📄</span><span class="name">${esc(name)}</span><span class="cnt">${matchCount}/${totalCount}</span></div><div class="tree-fns collapsed">`;
      for(const f of child){
        const m=fnMatches(f);
        const cls=m?(searchTerm?"tree-fn match-hl":"tree-fn"):"tree-fn hidden-fn";
        const mg=mergeSig(f.n,f.s);
        html+=`<div class="${cls}"><div class="tree-fn-top"><div class="tree-fn-main"><code>${esc(mg.name)}</code>${mg.sig?` <span class="sig">${esc(mg.sig)}</span>`:""}</div>${f.u?`<a class="source-link" href="${escAttr(f.u)}" target="_blank" rel="noreferrer">Source</a>`:""}</div>`;
        html+=`<span class="ptag-row">${f.p.map(p=>`<span class="ptag-sm" style="background:${PC[p]||"#888"}">${PN[p]||p}</span>`).join("")}</span>`;
        html+="</div>";
      }
      html+="</div></div>";
    } else {
      html+=`<div class="tree-node"><div class="tree-dir${dimCls}" data-path="${esc(fullPath)}" onclick="toggleChildren(this)"><span class="arrow">▶</span><span class="icon">📁</span><span class="name">${esc(name)}/</span><span class="cnt">${matchCount}/${totalCount}</span></div><div class="tree-children collapsed">`;
      html+=renderTree(child,path+name+"/");
      html+="</div></div>";
    }
  }
  return html;
}

function switchCrate(cid){
  currentCrate=currentCrate===cid?"__all__":cid;
  renderSidebar();
  renderPanel(currentCrate);
}

function renderCrateNode(cid2,cd){
  const mc=countMatchesInNode(cd.tree);
  const tc=countAllInNode(cd.tree);
  if(mc===0&&(activeFilter!=="all"||searchTerm))return{html:"",mc,tc};
  const countHtml=cd.kind==="external"?"":`<span class="cnt">${mc}/${tc}</span>`;
  let html=`<div class="tree-node" data-crate="${cid2}">`;
  html+=`<div class="tree-dir" data-path="__crate_${cid2}" onclick="toggleChildren(this)" style="background:${cd.c}15;border-left:3px solid ${cd.c}"><span class="arrow">▶</span><span class="icon">📦</span><span class="name" style="color:${cd.c};font-weight:700">${cd.name}</span>${countHtml}</div>`;
  html+=`<div class="tree-children collapsed">${renderTree(cd.tree, "__crate_"+cid2+"/")}</div></div>`;
  return{html,mc,tc};
}

function renderPanel(cid){
  saveCollapseState();
  if(cid==="__all__"){
    pt.textContent="Function browser";
    let totalMatched=0,totalAll=0;
    let implHtml="",extHtml="",extMatched=0,extTotal=0;
    for(const[cid2,cd] of Object.entries(D)){
      const r=renderCrateNode(cid2,cd);
      totalMatched+=r.mc;totalAll+=r.tc;
      if(EXT_CRATES.has(cid2)){extHtml+=r.html;extMatched+=r.mc;extTotal+=r.tc;}else{implHtml+=r.html;}
    }
    let html=implHtml;
    if(extHtml){
      html+=`<div class="tree-node"><div class="tree-dir" data-path="__ext_group" onclick="toggleChildren(this)" style="background:#7a653015;border-left:3px solid var(--ext)"><span class="arrow">▶</span><span class="icon">📦</span><span class="name" style="color:var(--ext);font-weight:700">External Crypto Crates</span></div><div class="tree-children collapsed">${extHtml}</div></div>`;
    }
    st.textContent=`Showing ${totalMatched} of ${totalAll} rows across ${Object.keys(D).length} crates`;
    pc.innerHTML=html;
    restoreCollapseState();
    return;
  }
  const d=D[cid];if(!d)return;
  const mc=countMatchesInNode(d.tree);
  const tc=countAllInNode(d.tree);
  pt.textContent="Function browser";
  st.textContent=`Showing ${mc} of ${tc} rows`;
  const countHtml=d.kind==="external"?"":`<span class="cnt">${mc}/${tc}</span>`;
  const html=`<div class="tree-node" data-crate="${cid}"><div class="tree-dir" data-path="__crate_${cid}" onclick="toggleChildren(this)" style="background:${d.c}15;border-left:3px solid ${d.c}"><span class="arrow open">▶</span><span class="icon">📦</span><span class="name" style="color:${d.c};font-weight:700">${d.name}</span>${countHtml}</div><div class="tree-children">${renderTree(d.tree, "__crate_"+cid+"/")}</div></div>`;
  pc.innerHTML=html;
  restoreCollapseState();
}

// ═══ Collapse state tracking ═══
// Set of path strings that are currently open; everything else is collapsed
const openPaths=new Set();

function saveCollapseState(){
  openPaths.clear();
  pc.querySelectorAll('[data-path]').forEach(el=>{
    const content=el.nextElementSibling;
    if(content && !content.classList.contains('collapsed')){
      openPaths.add(el.dataset.path);
    }
  });
}

function restoreCollapseState(){
  pc.querySelectorAll('[data-path]').forEach(el=>{
    const content=el.nextElementSibling;
    if(!content)return;
    const isOpen=openPaths.has(el.dataset.path);
    content.classList.toggle('collapsed',!isOpen);
    const arrow=el.querySelector('.arrow');
    if(arrow)arrow.classList.toggle('open',isOpen);
  });
}

// Toggle functions
window.toggleChildren=function(el){
  const ch=el.nextElementSibling;
  if(!ch)return;
  const isOpen=!ch.classList.contains('collapsed');
  ch.classList.toggle('collapsed');
  el.querySelector('.arrow').classList.toggle('open',!isOpen);
  if(el.dataset.path){
    if(isOpen) openPaths.delete(el.dataset.path);
    else openPaths.add(el.dataset.path);
  }
};
window.toggleNext=function(el){
  const ch=el.nextElementSibling;
  if(!ch)return;
  const isOpen=!ch.classList.contains('collapsed');
  ch.classList.toggle('collapsed');
  const arrow=el.querySelector('.arrow');
  if(arrow)arrow.classList.toggle('open',!isOpen);
  if(el.dataset.path){
    if(isOpen) openPaths.delete(el.dataset.path);
    else openPaths.add(el.dataset.path);
  }
};

// Expand all / Collapse all
window.expandAll=function(){
  pc.querySelectorAll('.tree-children.collapsed, .tree-fns.collapsed').forEach(el=>el.classList.remove('collapsed'));
  pc.querySelectorAll('.arrow').forEach(el=>el.classList.add('open'));
  pc.querySelectorAll('[data-path]').forEach(el=>openPaths.add(el.dataset.path));
};
window.collapseAll=function(){
  pc.querySelectorAll('.tree-children, .tree-fns').forEach(el=>el.classList.add('collapsed'));
  pc.querySelectorAll('.arrow').forEach(el=>el.classList.remove('open'));
  openPaths.clear();
};

// ═══ Initialize: show all functions on load ═══
async function init(){
  const sharedPayload=await loadSharedPayload();
  applyView(sharedPayload?buildAltViewFromPayload(sharedPayload):FALLBACK_VIEW);
  activeFilter="all";
  searchTerm="";
  currentCrate="__all__";
  renderSidebar();
  renderPanel('__all__');
}

init();
</script>
